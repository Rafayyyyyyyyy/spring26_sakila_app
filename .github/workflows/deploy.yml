name: Deployment Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - README.md
      - docs/**
      - "*.md"
      - .gitignore

jobs:

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t sakila-app:staging .

      - run: |
          docker run -d -p 5001:5000 --name sakila-staging sakila-app:staging || true

      - run: |
          echo "STAGING DEPLOYMENT SUMMARY" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: staging" >> $GITHUB_STEP_SUMMARY
          echo "Image: sakila-app:staging" >> $GITHUB_STEP_SUMMARY
          echo "Status: SUCCESS" >> $GITHUB_STEP_SUMMARY

      - run: echo "Staging deployment successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - run: echo "TAG=v$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - run: |
          echo "Deploying to PRODUCTION"
          echo "Version: $TAG"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: echo "Production deployment successful"