name: Sakila CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: sakila-app

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install flake8

      - run: flake8 . --max-line-length=120 --ignore=E501,W503


# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install -r requirements.txt

      - run: sleep 20

      - run: |
          mysql -h 127.0.0.1 -uroot -padmin sakila < sakila/sakila-schema.sql
          mysql -h 127.0.0.1 -uroot -padmin sakila < sakila/sakila-data.sql

      - run: pytest -v


# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - run: docker images

      - run: |
          docker run -d -p 5000:5000 --name sakila-app $IMAGE_NAME:${{ github.sha }}
          sleep 10
          curl http://localhost:5000 || echo "OK"


# ---------------- SECURITY SCAN ----------------
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t $IMAGE_NAME:scan .

      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH